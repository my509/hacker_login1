<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>HACKER TERMINAL | Đăng nhập & Đăng ký</title>
  <!-- Font monospace chuẩn hacker -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c0f;
      font-family: 'Share Tech Mono', 'VT323', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Matrix rain canvas background */
    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.35;
      pointer-events: none;
    }

    /* Overlay tối để tăng độ tương phản cho form */
    .dark-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0, 10, 0, 0.4) 0%, rgba(0, 0, 0, 0.85) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* Container chính */
    .terminal-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(16px);
      border: 2px solid #0f0;
      box-shadow: 0 0 30px rgba(0, 255, 0, 0.25), 0 0 10px rgba(0, 255, 0, 0.5) inset;
      border-radius: 12px;
      padding: 25px 20px 30px;
      color: #0f0;
      transition: all 0.3s ease;
    }

    /* Header kiểu terminal */
    .terminal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px dashed #0f0;
      padding-bottom: 12px;
      margin-bottom: 20px;
    }

    .terminal-dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #0f0;
      box-shadow: 0 0 8px #0f0;
    }

    .dot.red {
      background: #ff3333;
      box-shadow: 0 0 10px #ff3333;
    }
    .dot.yellow {
      background: #ffcc00;
      box-shadow: 0 0 10px #ffcc00;
    }
    .dot.green {
      background: #0f0;
      box-shadow: 0 0 10px #0f0;
    }

    .terminal-title {
      font-size: 1.3rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: bold;
      text-shadow: 0 0 10px #0f0, 0 0 5px #008800;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .blink-cursor {
      display: inline-block;
      width: 10px;
      height: 18px;
      background: #0f0;
      margin-left: 4px;
      animation: blink 1s steps(1) infinite;
      box-shadow: 0 0 8px #0f0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Form styling */
    .form-wrapper {
      position: relative;
      overflow: hidden;
      min-height: 320px;
    }

    .form-panel {
      display: flex;
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      width: 200%;
    }

    .login-form, .register-form {
      width: 50%;
      padding: 0 10px;
      flex-shrink: 0;
    }

    /* Khi active register sẽ dịch chuyển panel */
    .form-panel.register-active {
      transform: translateX(-50%);
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #0f0;
      text-shadow: 0 0 5px #0f0;
    }

    .input-field {
      width: 100%;
      background: rgba(0, 20, 0, 0.7);
      border: 1px solid #0f0;
      border-radius: 6px;
      padding: 14px 15px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      color: #0f0;
      outline: none;
      transition: all 0.25s;
      box-shadow: 0 0 5px rgba(0, 255, 0, 0.2) inset;
      backdrop-filter: blur(4px);
    }

    .input-field::placeholder {
      color: #0a0;
      opacity: 0.6;
      font-style: italic;
    }

    .input-field:focus {
      border-color: #00ffaa;
      box-shadow: 0 0 18px #0f0, 0 0 8px #00ff88 inset;
      background: rgba(0, 30, 0, 0.8);
    }

    /* Nút bấm hacker */
    .hacker-btn {
      width: 100%;
      background: transparent;
      border: 2px solid #0f0;
      color: #0f0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      padding: 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
      text-shadow: 0 0 5px #0f0;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: bold;
      backdrop-filter: blur(10px);
      background: rgba(0, 0, 0, 0.5);
    }

    .hacker-btn:hover {
      background: #0f0;
      color: #000;
      box-shadow: 0 0 35px #0f0, 0 0 15px #0f0;
      text-shadow: none;
      border-color: #0f0;
      font-weight: bold;
      transform: scale(1.02);
    }

    .hacker-btn:active {
      background: #00aa00;
      border-color: #00ffaa;
      box-shadow: 0 0 45px #0f0;
    }

    /* Link chuyển đổi */
    .switch-text {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      color: #0a0;
    }

    .switch-link {
      color: #0f0;
      text-decoration: underline;
      cursor: pointer;
      font-weight: bold;
      text-shadow: 0 0 6px #0f0;
      transition: 0.2s;
      margin-left: 5px;
    }

    .switch-link:hover {
      color: #fff;
      text-shadow: 0 0 12px #0f0, 0 0 20px #00ff88;
    }

    /* Thông báo lỗi / thành công */
    .message-box {
      margin-top: 12px;
      font-size: 0.85rem;
      min-height: 22px;
      text-align: center;
      padding: 6px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.5);
      border-left: 3px solid #0f0;
      color: #0f0;
      text-shadow: 0 0 4px #0f0;
    }

    .error-message {
      border-left-color: #ff4444;
      color: #ff6666;
      text-shadow: 0 0 6px #ff0000;
    }

    /* Icon nhỏ */
    .icon-terminal {
      font-size: 1.2rem;
    }

    @media (max-width: 450px) {
      .terminal-container {
        padding: 20px 15px;
      }
    }
  </style>
</head>
<body>
  <!-- Canvas cho hiệu ứng Matrix -->
  <canvas id="matrixCanvas"></canvas>
  <div class="dark-overlay"></div>

  <!-- Terminal chính -->
  <div class="terminal-container">
    <div class="terminal-header">
      <div class="terminal-dots">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>
      <div class="terminal-title">
        <span>[ HACKER_PORTAL ]</span>
        <span class="blink-cursor"></span>
      </div>
      <div style="opacity:0.7; font-size:0.8rem;">v.2.3</div>
    </div>

    <!-- Form wrapper với panel trượt -->
    <div class="form-wrapper">
      <div class="form-panel" id="formPanel">
        <!-- FORM ĐĂNG NHẬP -->
        <div class="login-form">
          <form id="loginForm" autocomplete="off">
            <div class="input-group">
              <label>✦ Username / Mã đặc vụ</label>
              <input type="text" class="input-field" id="loginUsername" placeholder="VD: neo_hacker" required>
            </div>
            <div class="input-group">
              <label>✦ Mật khẩu</label>
              <input type="password" class="input-field" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="hacker-btn">
              <span class="icon-terminal">⌨️</span> ĐĂNG NHẬP <span class="icon-terminal">⏎</span>
            </button>
          </form>
          <div class="switch-text">
            Chưa có tài khoản? <span class="switch-link" id="goToRegister">[ Tạo mới ]</span>
          </div>
        </div>

        <!-- FORM ĐĂNG KÝ -->
        <div class="register-form">
          <form id="registerForm" autocomplete="off">
            <div class="input-group">
              <label>✦ Tên đặc vụ</label>
              <input type="text" class="input-field" id="regUsername" placeholder="Chọn mã danh" required>
            </div>
            <div class="input-group">
              <label>✦ Email (mã hóa)</label>
              <input type="email" class="input-field" id="regEmail" placeholder="user@darknet.io" required>
            </div>
            <div class="input-group">
              <label>✦ Mật khẩu</label>
              <input type="password" class="input-field" id="regPassword" placeholder="Tối thiểu 6 ký tự" required minlength="6">
            </div>
            <div class="input-group">
              <label>✦ Xác nhận mật khẩu</label>
              <input type="password" class="input-field" id="regConfirm" placeholder="Nhập lại mật khẩu" required>
            </div>
            <button type="submit" class="hacker-btn">
              <span class="icon-terminal">💾</span> KHỞI TẠO <span class="icon-terminal">⚡</span>
            </button>
          </form>
          <div class="switch-text">
            Đã có tài khoản? <span class="switch-link" id="goToLogin">[ Đăng nhập ]</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Khu vực hiển thị thông báo động -->
    <div id="messageBox" class="message-box"></div>
    <div style="text-align: right; font-size: 0.7rem; margin-top: 8px; opacity: 0.6; color: #0f0;">
      [ Kết nối an toàn • mã hóa AES-256 ]
    </div>
  </div>

  <script>
    (function() {
      // ---------- MATRIX RAIN EFFECT ----------
      const canvas = document.getElementById('matrixCanvas');
      const ctx = canvas.getContext('2d');

      let width, height;
      let columns;
      let drops;
      const fontSize = 16;
      const matrixChars = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZɃ₿ĐɆⱧł₦Ɇ₮ⱧɆⱤ".split("");

      function initMatrix() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        columns = Math.floor(width / fontSize) + 1;
        drops = [];
        for (let i = 0; i < columns; i++) {
          drops[i] = Math.random() * -100;
        }
      }

      function drawMatrix() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = '#0f0';
        ctx.font = fontSize + 'px "Share Tech Mono", "VT323", monospace';
        ctx.shadowColor = '#0f0';
        ctx.shadowBlur = 8;

        for (let i = 0; i < drops.length; i++) {
          const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
          const x = i * fontSize;
          const y = drops[i] * fontSize;
          ctx.fillText(char, x, y);
          if (y > height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i]++;
        }
        ctx.shadowBlur = 0;
      }

      initMatrix();
      window.addEventListener('resize', initMatrix);
      setInterval(drawMatrix, 45);

      // ---------- CHUYỂN ĐỔI FORM ----------
      const formPanel = document.getElementById('formPanel');
      const goToRegister = document.getElementById('goToRegister');
      const goToLogin = document.getElementById('goToLogin');
      const messageBox = document.getElementById('messageBox');

      // Input fields
      const loginUsername = document.getElementById('loginUsername');
      const loginPassword = document.getElementById('loginPassword');
      const regUsername = document.getElementById('regUsername');
      const regEmail = document.getElementById('regEmail');
      const regPassword = document.getElementById('regPassword');
      const regConfirm = document.getElementById('regConfirm');

      // Forms
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');

      // Chuyển sang đăng ký
      goToRegister.addEventListener('click', function(e) {
        e.preventDefault();
        formPanel.classList.add('register-active');
        clearMessage();
        // Focus vào ô đầu tiên của form đăng ký
        setTimeout(() => regUsername.focus(), 200);
      });

      // Chuyển về đăng nhập
      goToLogin.addEventListener('click', function(e) {
        e.preventDefault();
        formPanel.classList.remove('register-active');
        clearMessage();
        setTimeout(() => loginUsername.focus(), 200);
      });

      // Hiển thị thông báo
      function showMessage(text, isError = false) {
        messageBox.textContent = text;
        messageBox.className = 'message-box' + (isError ? ' error-message' : '');
      }

      function clearMessage() {
        messageBox.textContent = '';
        messageBox.className = 'message-box';
      }

      // ---------- XỬ LÝ ĐĂNG NHẬP ----------
      loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const user = loginUsername.value.trim();
        const pass = loginPassword.value.trim();

        if (!user || !pass) {
          showMessage('[!] Vui lòng nhập đầy đủ thông tin đăng nhập.', true);
          return;
        }

        // Giả lập kiểm tra tài khoản (demo)
        // Trong thực tế sẽ gửi đến server. Ở đây dùng localStorage để lưu user đã đăng ký (demo)
        const storedUsers = JSON.parse(localStorage.getItem('hacker_users')) || [];
        const foundUser = storedUsers.find(u => u.username === user && u.password === pass);

        if (foundUser) {
          showMessage('✅ Đăng nhập thành công! Chào mừng ' + user + ' quay trở lại hệ thống.', false);
          // Có thể chuyển hướng hoặc hiệu ứng
          loginUsername.value = '';
          loginPassword.value = '';
        } else {
          // Thử kiểm tra nếu user tồn tại nhưng sai pass
          const userExists = storedUsers.some(u => u.username === user);
          if (userExists) {
            showMessage('[!] Sai mật khẩu. Vui lòng thử lại.', true);
          } else {
            showMessage('[!] Tài khoản không tồn tại. Hãy đăng ký.', true);
          }
        }
      });

      // ---------- XỬ LÝ ĐĂNG KÝ ----------
      registerForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const username = regUsername.value.trim();
        const email = regEmail.value.trim();
        const password = regPassword.value.trim();
        const confirm = regConfirm.value.trim();

        // Validation cơ bản
        if (!username || !email || !password || !confirm) {
          showMessage('[!] Tất cả các trường đều bắt buộc.', true);
          return;
        }

        if (password.length < 6) {
          showMessage('[!] Mật khẩu phải có ít nhất 6 ký tự.', true);
          return;
        }

        if (password !== confirm) {
          showMessage('[!] Xác nhận mật khẩu không khớp.', true);
          return;
        }

        // Kiểm tra email định dạng cơ bản
        if (!email.includes('@') || !email.includes('.')) {
          showMessage('[!] Email không hợp lệ.', true);
          return;
        }

        // Lưu vào localStorage (database giả lập)
        const storedUsers = JSON.parse(localStorage.getItem('hacker_users')) || [];
        const userExists = storedUsers.some(u => u.username === username);
        const emailExists = storedUsers.some(u => u.email === email);

        if (userExists) {
          showMessage('[!] Tên đặc vụ đã tồn tại. Chọn tên khác.', true);
          return;
        }

        if (emailExists) {
          showMessage('[!] Email này đã được đăng ký.', true);
          return;
        }

        // Thêm user mới
        storedUsers.push({ username, email, password });
        localStorage.setItem('hacker_users', JSON.stringify(storedUsers));

        showMessage('🎉 Đăng ký thành công! Đang chuyển về đăng nhập...', false);
        
        // Xoá form đăng ký
        regUsername.value = '';
        regEmail.value = '';
        regPassword.value = '';
        regConfirm.value = '';

        // Tự động chuyển về login sau 1.5 giây
        setTimeout(() => {
          formPanel.classList.remove('register-active');
          clearMessage();
          loginUsername.focus();
        }, 1500);
      });

      // Thêm hiệu ứng âm thanh giả lập qua console (tùy chọn)
      console.log("%c👾 HACKER TERMINAL ACTIVATED %c| %cĐăng nhập & Đăng ký sẵn sàng",
        "color: #0f0; font-size: 16px;", "", "color: #aaa;");
      console.log("%c▸ Dữ liệu lưu cục bộ (localStorage) để demo.", "color: #0f0;");
    })();
  </script>
</body>
</html>
